# Backend now runs on Google Cloud Run (see backend/Dockerfile) - Render's Python
# free tier couldn't fit the embedding + reranker models in 512MB. This file only
# hosts the frontend static site now.
services:
  - type: web
    name: rag-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && node node_modules/vite/bin/vite.js build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://nexus-backend-336283005819.us-central1.run.app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
